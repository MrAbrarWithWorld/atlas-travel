function getLocation() {
  return new Promise((resolve) => {
    if(!navigator.geolocation) { resolve(""); return; }
    const timer = setTimeout(() => resolve(""), 4000);
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        clearTimeout(timer);
        try {
          const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`);
          const d = await r.json();
          const city = d.address?.city || d.address?.town || d.address?.village || "";
          const country = d.address?.country || "";
          resolve(city && country ? `${city}, ${country}` : country || "");
        } catch { resolve(""); }
      },
      () => { clearTimeout(timer); resolve(""); },
      { timeout: 4000 }
    );
  });
}

function getDateTime() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const day = days[now.getDay()];
  const date = now.getDate();
  const month = months[now.getMonth()];
  const year = now.getFullYear();
  const hours = now.getHours();
  const mins = now.getMinutes().toString().padStart(2,'0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  const h12 = hours % 12 || 12;
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  return `${day}, ${month} ${date}, ${year} — ${h12}:${mins} ${ampm} (${tz})`;
}

const PERSONA = `You are ATLAS — the world's most sophisticated AI travel intelligence.

LANGUAGE: Detect user language instantly. Respond ENTIRELY in that language.
CURRENCY: Use exactly the currency the user mentions.

CURRENT DATE & TIME: You always know the exact current date and time because it is injected into every message. Use this to calculate travel dates, seasons, visa processing times, and flight booking windows accurately. Never say you don't know the date or time.

PASSPORT & VISA — CRITICAL:
- Always ask which passport if not mentioned.
- Never assume strong passport.
- Handle: Bangladesh, Pakistan, India, Nigeria, RTD, Dual citizenship.
- For RTD: ask which country issued it, explain visa requirements specifically.

ROUTING RULES:
- Always find most efficient route. Direct over connecting always.
- Never repeat same flight segment twice.
- Always compare direct vs connecting and show savings.

Structure every plan:
## ✈️ FLIGHTS — routing analysis, direct vs connecting, savings
## 🛂 VISA — specific to passport type, where to apply, cost, time
## 🏨 STAY — specific hotel, price per night, booking platform
## 🍽️ EAT — daily budget, restaurants with prices
## 🚇 MOVE — airport transfer, city transport, daily cost
## 🗓️ DAY BY DAY — complete EVERY day, never stop early
## 💰 TOTAL COST — itemized breakdown, savings shown
## 🎬 CONTENT SPOTS — filming locations, golden hour times
## 📋 ESSENTIALS — visa, SIM, ATM, safety, weather

COMFORT JOURNEY — ELDERLY/PARENTS:
If user mentions parents, elderly, or cannot do long flights:
- Automatically split flights into max 6-8 hour segments
- Add 1-2 night layover at best stopover city
- Recommend AIRPORT TRANSIT HOTELS (inside or near airport)
  Examples: Dubai (Al Maha by Marriott), Doha (Oryx Airport Hotel),
  Istanbul (Yotel Istanbul Airport), Singapore (Crowne Plaza Changi)
- Show exact layover hotel cost, how to book, distance from terminal
- Calculate total journey time with rest vs direct
- Show visa requirements for layover country
- Suggest best stopover cities based on route:
  Dhaka→Toronto: Dubai, Doha, Istanbul, London
  Asia→Europe: Dubai, Doha, Singapore
  Asia→USA: Tokyo, Seoul, Singapore
- Always show: Flight 1 → Rest → Flight 2 → Rest (if needed) → Destination
- Include: wheelchair assistance availability, senior discounts, meal options

LINKS — ALWAYS INCLUDE:
- Visa applications: include official government website link
- Hotels: include booking.com or official hotel link
- Flights: include google.com/flights or skyscanner.net link
- Transport: include official transport website
- Format links as: [Link Text](https://url.com)

CRITICAL: Never truncate. Complete every day. Always cheapest routing.`;

const STORAGE_KEY = 'atlas_v5';

function saveChat(msgs, hist) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({msgs, hist, t: Date.now()})); } catch(e){}
}
function loadChat() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
    if(!d || Date.now()-d.t > 24*60*60*1000) return null;
    return d;
  } catch(e){return null;}
}

  const [editText, setEditText] = useState("");
  const [busy, setBusy] = useState(false);
  const [modal, setModal] = useState(null);
  const [listening, setListening] = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const hist = useRef(saved?.hist||[...defaultHist]);
  const endRef = useRef(null);
  const taRef = useRef(null);
  const editRef = useRef(null);
  const recognitionRef = useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,busy]);

  useEffect(()=>{
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    const r = new SR();
    r.continuous = false;
    r.interimResults = true;
    r.onresult = e => {
      const t = Array.from(e.results).map(r=>r[0].transcript).join('');
      setDraft(t);
      if(e.results[e.results.length-1].isFinal) setListening(false);
    };
    r.onend = ()=>setListening(false);
    r.onerror = ()=>setListening(false);
    recognitionRef.current = r;
  },[]);

  function toggleVoice() {
    if(!recognitionRef.current){alert("Voice not supported. Use Chrome or Safari.");return;}
    if(listening){recognitionRef.current.stop();setListening(false);}
    else{if(window.speechSynthesis)window.speechSynthesis.cancel();recognitionRef.current.start();setListening(true);}
  }

  function toggleSpeak(text) {
    if(!window.speechSynthesis) return;
    if(speaking){window.speechSynthesis.cancel();setSpeaking(false);return;}
    setSpeaking(true);
    const clean = text.replace(/##.*?\n/g,'').replace(/\*\*/g,'').replace(/[◆•]/g,'').slice(0,1000);
    const u = new SpeechSynthesisUtterance(clean);
    u.rate=0.95;
    u.onend=()=>setSpeaking(false);
    u.onerror=()=>setSpeaking(false);
    window.speechSynthesis.speak(u);
  }

  function startEdit(msg) {
    setEditingId(msg.id);
    setEditText(msg.text);
    setTimeout(()=>editRef.current?.focus(),50);
  }

  async function submitEdit(msgId) {
    const t = editText.trim();
    if(!t) return;
    setEditingId(null);
    const msgIndex = msgs.findIndex(m=>m.id===msgId);
    const newMsgs = msgs.slice(0, msgIndex);
    setMsgs(newMsgs);
    const baseHist = [...defaultHist];
    for(const m of newMsgs) {
      baseHist.push({role: m.from==="user"?"user":"assistant", content: m.text});
    }
    hist.current = baseHist;
    await send(t);
  }

  async function send(txt) {
    const t=(txt??draft).trim();
    if(!t||busy) return;
    if(window.speechSynthesis)window.speechSynthesis.cancel();
    setSpeaking(false);
    setDraft("");
    if(taRef.current)taRef.current.style.height="auto";
    const dateTime = getDateTime();
    const location = await getLocation();
    const locationStr = location ? `\nUser location: ${location}` : "";
    const msgWithTime = `${t}\n\n[Current date & time: ${dateTime}${locationStr}]`;
    const newMsgs=[...msgs,{id:Date.now(),from:"user",text:t}];
    setMsgs(newMsgs);
    setBusy(true);
    hist.current=[...hist.current,{role:"user",content:msgWithTime}];
    try {
      const res = await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:hist.current.slice(-16)})});

        const data=await res.json();
        const msg=data.error?.message||"";

      saveChat(final,hist.current);

      setMsgs(m=>[...m,{id:Date.now()+1,from:"ai",text:"Something went wrong. Please try again."}]);

    ),

    // Messages
    React.createElement("div",{style:{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",display:"flex",flexDirection:"column"}},
      msgs.length===0&&React.createElement("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",textAlign:"center"}},
        React.createElement("div",{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:"2.4rem",fontWeight:300,color:"rgba(201,169,110,0.15)",letterSpacing:"0.25em",textTransform:"uppercase",marginBottom:"1.5rem"}},"ATLAS"),
        React.createElement("p",{style:{fontSize:"0.85rem",color:"#6a5a35",lineHeight:2,maxWidth:"220px"}},"Tell me where you want to go.",React.createElement("br"),"Any language. Any budget. Any dream."),
        hasVoice&&React.createElement("div",{style:{marginTop:"1.75rem",display:"flex",alignItems:"center",gap:"0.5rem",color:"#4a3a20",fontSize:"0.58rem",letterSpacing:"0.1em",textTransform:"uppercase"}},
          React.createElement("svg",{width:"11",height:"11",viewBox:"0 0 24 24",fill:"none",stroke:"#5a4a28",strokeWidth:"1.5",strokeLinecap:"round",strokeLinejoin:"round"},
            React.createElement("rect",{x:"9",y:"2",width:"6",height:"12",rx:"3"}),
            React.createElement("path",{d:"M5 10a7 7 0 0 0 14 0"}),
            React.createElement("line",{x1:"12",y1:"19",x2:"12",y2:"22"}),
            React.createElement("line",{x1:"8",y1:"22",x2:"16",y2:"22"})

          React.createElement("div",{style:{flexShrink:0,width:24,height:24,borderRadius:"50%",border:`1px solid ${msg.from==="user"?"rgba(201,169,110,0.25)":"rgba(201,169,110,0.5)"}`,background:msg.from==="user"?"rgba(201,169,110,0.05)":"rgba(201,169,110,0.08)",display:"flex",alignItems:"center",justifyContent:"center",marginTop:2}},
            React.createElement("span",{style:{fontSize:"0.46rem",color:"#c9a96e"}},msg.from==="user"?"U":"A")
          ),
          React.createElement("div",{style:{maxWidth:"88%"}},
            msg.from==="user"
              ? editingId===msg.id
