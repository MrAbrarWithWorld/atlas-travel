function App(){
  const saved=loadLocal();
  const [msgs,setMsgs]=useState(saved?.msgs||[]);
  const [draft,setDraft]=useState("");
  const [editingId,setEditingId]=useState(null);
  const [editText,setEditText]=useState("");
  const [busy,setBusy]=useState(false);

  const [showSidebar,setShowSidebar]=useState(false);
  const [user,setUser]=useState(null);
  const [listening,setListening]=useState(false);
  const [speaking,setSpeaking]=useState(false);
  const [photo,setPhoto]=useState(null);
  const [plans,setPlans]=useState([]);
  const [loadingPlans,setLoadingPlans]=useState(false);
  const [activePlanId,setActivePlanId]=useState(null);
  const [savingPlan,setSavingPlan]=useState(false);
  const [userTier,setUserTier]=useState('free');
  const [holdActive,setHoldActive]=useState(false);
  const hist=useRef(saved?.hist||[...defaultHist]);
  const endRef=useRef(null);
  const taRef=useRef(null);
  const editRef=useRef(null);
  const recognitionRef=useRef(null);
  const photoRef=useRef(null);
  const holdTimerRef=useRef(null);

  // Payment success/cancel detection
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    if(params.get('payment')==='success'){
      showToast('🎉 Welcome to Pro! Enjoy unlimited plans.');
      window.history.replaceState({},'','/');
    } else if(params.get('payment')==='cancelled'){
      window.history.replaceState({},'','/');
    }
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setUser(session?.user||null));
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
  if(user){
    loadPlans();
    sb.from('allowed_users').select('email').eq('email',user.email).single().then(({data:allowed})=>{
  if(allowed){setUserTier('pro');return;}
  sb.from('subscriptions').select('plan,status,current_period_end').eq('user_id',user.id).eq('status','active').gte('current_period_end',new Date().toISOString()).single().then(({data})=>{
    if(data)setUserTier(data.plan?.includes('explorer')?'explorer':'pro');
    else setUserTier('free');
  });
});
  } else {
    setPlans([]);
    setUserTier('free');
  }
},[user]);
  
  async function loadPlans(){
    setLoadingPlans(true);
    try{const{data,error}=await sb.from('saved_plans').select('id,title,created_at,is_draft').order('created_at',{ascending:false});if(!error)setPlans(data||[]);}
    catch{}setLoadingPlans(false);
  }

  async function savePlan(){
    if(!user||msgs.length===0)return;
    setSavingPlan(true);
    try{
      const title=extractTitle(hist.current);
      const locs=msgs.filter(m=>m.locations).flatMap(m=>m.locations||[]);
      if(activePlanId){
        const{error}=await sb.from('saved_plans').update({is_draft:false,title,messages:hist.current,locations:locs.length>0?locs:null}).eq('id',activePlanId);
        if(!error){await loadPlans();showToast('✓ Trip saved!');}
      } else {
        const{data,error}=await sb.from('saved_plans').insert({user_id:user.id,title,messages:hist.current,locations:locs.length>0?locs:null,is_draft:false}).select('id,share_id').single();
        if(!error){await loadPlans();showToast('✓ Trip saved!');if(data?.id)setActivePlanId(data.id);}
      }
    }catch{}setSavingPlan(false);
  }

  function showToast(msg){
    const toast=document.createElement('div');
    toast.textContent=msg;
    toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#252018;border:1px solid rgba(201,169,110,0.4);color:#c9a96e;padding:0.5rem 1rem;border-radius:8px;font-size:0.72rem;font-family:DM Sans,sans-serif;z-index:999;letter-spacing:0.08em;';
    document.body.appendChild(toast);setTimeout(()=>toast.remove(),2500);
  }

  async function sharePlan(){
    if(!activePlanId)return;
    try{
      const{data,error}=await sb.from('saved_plans').update({is_public:true}).eq('id',activePlanId).select('share_id').single();
      if(!error&&data?.share_id){
        const shareUrl=`${window.location.origin}/trip/${data.share_id}`;
        await navigator.clipboard.writeText(shareUrl);

        }
