  // ===================== GOOGLE CALENDAR SYNC =====================
async function addToGoogleCalendar(events){
  // Load Google Identity Services
  await new Promise((resolve,reject)=>{
    if(window.google?.accounts?.oauth2){resolve();return;}
    const s=document.createElement('script');
    s.src='https://accounts.google.com/gsi/client';
    s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });
  // Request Calendar access token
  const token=await new Promise((resolve,reject)=>{
    const client=google.accounts.oauth2.initTokenClient({
      client_id:GOOGLE_CLIENT_ID,
      scope:GOOGLE_CALENDAR_SCOPE,
      callback:(resp)=>{if(resp.error)reject(new Error('Calendar access denied'));else resolve(resp.access_token);}
    });
    client.requestAccessToken({prompt:'consent'});
  });
  // Add events to Google Calendar
  let added=0;
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  for(const ev of events){
    const body={
      summary:ev.title,
      description:ev.description||'',
      colorId:ev.colorId||'1',
      start:ev.allDay?{date:ev.start}:{dateTime:`${ev.start}T${ev.time||'09:00'}:00`,timeZone:tz},
      end:ev.allDay?{date:ev.end||ev.start}:{dateTime:`${ev.end||ev.start}T${ev.time||'10:00'}:00`,timeZone:tz},
    };
    const r=await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(r.ok)added++;
  }
  return added;
}

if(rangeMatch){const rr=[...m.text.matchAll(/\b(Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+(\d{1,2})(?:st|nd|rd|th)?\s+to\s+(\d{1,2})/gi)];for(const r of rr){const mo=_M[r[1].slice(0,3)];if(mo){found.push(`${_yr}-${mo}-${r[2].padStart(2,'0')}`);found.push(`${_yr}-${mo}-${r[3].padStart(2,'0')}`);}}}    }

  const [fontSize, setFontSize] = React.useState(()=>localStorage.getItem('atlas_fontsize')||'medium');
  const [prefs, setPrefs] = React.useState(()=>{
    try{return JSON.parse(localStorage.getItem('atlas_prefs')||'{}');}catch{return {};}
  });
  const [voices, setVoices] = React.useState([]);
  const [selectedVoiceURI, setSelectedVoiceURI] = React.useState(()=>localStorage.getItem('atlas_voice_uri')||'');
  const [customPrompt, setCustomPrompt] = React.useState(()=>localStorage.getItem('atlas_custom_prompt')||'');

    loadVoices();
    window.speechSynthesis?.addEventListener('voiceschanged',loadVoices);
    return()=>window.speechSynthesis?.removeEventListener('voiceschanged',loadVoices);
  },[]);
  function testVoice(){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance("Hello, I am Atlas, your AI travel companion.");if(selectedVoiceURI){const sv=window.speechSynthesis.getVoices().find(v=>v.voiceURI===selectedVoiceURI);if(sv)u.voice=sv;}window.speechSynthesis.speak(u);}

    setSaving(true);
    localStorage.setItem('atlas_prefs',JSON.stringify(prefs));
    localStorage.setItem('atlas_fontsize',fontSize);
    localStorage.setItem('atlas_voice_uri',selectedVoiceURI);

function MapView({locations,msgId}){
  const mapInstanceRef=useRef(null);
  useEffect(()=>{
    if(!locations||locations.length===0)return;
    if(!window.L)return;
    if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;}
    const cid=`atlas-map-${msgId}`;
    const container=document.getElementById(cid);
    if(!container)return;
    const map=window.L.map(container,{zoomControl:true,scrollWheelZoom:false,attributionControl:true});
    window.L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
    const bounds=[];const colors=['#c9a96e','#e8b84b','#d4a96e','#f0c070','#b89050'];
    locations.forEach((place,i)=>{
      if(!place.lat||!place.lon)return;
      const color=colors[i%colors.length];
      const icon=window.L.divIcon({className:'',html:`<div style="width:28px;height:28px;background:${color};border:2px solid #1c1914;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);color:#1c1914;font-size:10px;font-weight:700;font-family:'DM Sans',sans-serif;line-height:1;">${i+1}</span></div>`,iconSize:[28,28],iconAnchor:[14,28],popupAnchor:[0,-30]});
      window.L.marker([place.lat,place.lon],{icon}).addTo(map).bindPopup(`<b>${place.name}</b>${place.day>0?`<br><span style="color:#c9a96e;font-size:10px">Day ${place.day}</span>`:''}`);
      bounds.push([place.lat,place.lon]);
    });
    if(bounds.length===1)map.setView(bounds[0],11);
    else if(bounds.length>1)map.fitBounds(bounds,{padding:[30,30],maxZoom:10});
    // Draw routes between consecutive locations
if(bounds.length>1){
  for(let i=0;i<locations.length-1;i++){
    const from=locations[i];
    const to=locations[i+1];
    if(!from.lat||!from.lon||!to.lat||!to.lon)continue;
    window.L.polyline([[from.lat,from.lon],[to.lat,to.lon]],{
      color:'#c9a96e',weight:2,opacity:0.4,dashArray:'5,8'
    }).addTo(map);
  }
}
    mapInstanceRef.current=map;
    return()=>{if(mapInstanceRef.current){mapInstanceRef.current.remove();mapInstanceRef.current=null;}};
  },[locations,msgId]);
  if(!locations||locations.length===0)return null;
  return React.createElement("div",null,
    React.createElement("div",{style:{fontSize:"0.6rem",color:"#6a5a3a",letterSpacing:"0.1em",textTransform:"uppercase",marginTop:"0.75rem",marginBottom:"0.35rem",display:"flex",alignItems:"center",gap:"0.4rem"}},
      React.createElement("span",{style:{color:"#c9a96e"}},"◆"),`${locations.length} location${locations.length>1?'s':''} on map`
    ),
    React.createElement("div",{id:`atlas-map-${msgId}`,className:"atlas-map"})
  );
}

function isItinerary(text){if(!text)return false;const m=text.match(/\bDay\s+\d+/gi);return m&&m.length>=2;}
function isComparison(text){
  if(!text)return null;
  const clean=stripMapData(text);
  // Two ## headings → structured comparison
  const hh=clean.match(/^##\s+(.+)$/gm);
  if(hh&&hh.length===2)return[hh[0].replace(/^##\s+/,'').trim(),hh[1].replace(/^##\s+/,'').trim()];
  // "X vs Y" in first 300 chars → comparison header
  const head=clean.slice(0,300);
  const vm=head.match(/\b([A-Z][a-zA-ZÀ-ÿ\s&\-]{1,22}?)\s+(?:vs\.?|versus)\s+([A-Z][a-zA-ZÀ-ÿ\s&\-]{1,22}?)\b(?=[^a-z]|$)/);
  if(vm)return[vm[1].trim(),vm[2].trim()];
  return null;
}

function ComparisonCard({text}){

function TripDocument({text,msgs}){
  const destination=extractTitle(msgs.map(m=>({role:m.from==='user'?'user':'assistant',content:m.text||''})));
  // Extract budget estimate from text
  const budgetMatch=text.match(/\$\s*(\d[\d,]*)\s*[-–to]+\s*\$?\s*(\d[\d,]*)\s*(?:per\s+(?:day|person|night))?/i)||text.match(/budget[^$\n]*\$\s*(\d[\d,]+)/i)||text.match(/(?:approximately|around|about|est\.?)\s*\$\s*(\d[\d,]+)/i);
  const budgetText=budgetMatch?(budgetMatch[2]?`$${budgetMatch[1]}–$${budgetMatch[2]}`:`~$${budgetMatch[1]}`):null;
  const clean=stripMapData(text);
  const lines=clean.split('\n');
  // Parse into pre-content + day sections
  const sections=[];let curDay=null;const prelines=[];
  for(const line of lines){
    const t=line.trim();if(!t)continue;
    const dm=t.match(/^\*{0,2}(Day\s+\d+)[:\*\s\—\–]+([^\n]*)/i);
    if(dm){
      if(curDay)sections.push(curDay);
      else if(prelines.length){sections.push({type:'pre',content:prelines.join('\n')});prelines.length=0;}
      curDay={type:'day',label:dm[1],title:dm[2].replace(/\*+/g,'').trim(),items:[]};
    }else if(curDay){

  const [plans,setPlans]=useState([]);
  const [loadingPlans,setLoadingPlans]=useState(false);

  const [savingPlan,setSavingPlan]=useState(false);
  const [showSettings,setShowSettings]=useState(false); const [showHelp,setShowHelp]=useState(false);

  const [holdActive,setHoldActive]=useState(false);
  const [plansLeft,setPlansLeft]=useState(null);
  const [showOnboarding,setShowOnboarding]=useState(()=>!localStorage.getItem('atlas_onboarded')&&!loadLocal());
  const hist=useRef(saved?.hist||[...defaultHist]);
  const endRef=useRef(null);
  const taRef=useRef(null);
  const editRef=useRef(null);
  const recognitionRef=useRef(null);
  const photoRef=useRef(null);
  const holdTimerRef=useRef(null);

  // Tier check helper — polls subscriptions table and updates userTier state
  async function checkTier(uid,email){
    try{
      const{data:allowed}=await sb.from('allowed_users').select('email').eq('email',email).single();
      if(allowed){setUserTier('explorer');return 'explorer';}
      const{data}=await sb.from('subscriptions').select('plan,status,current_period_end').eq('user_id',uid).eq('status','active').gte('current_period_end',new Date().toISOString()).single();
      if(data){const t=data.plan?.includes('explorer')?'explorer':'pro';setUserTier(t);return t;}
      setUserTier('free');return 'free';
    }catch{setUserTier('free');return 'free';}
  }

  // Payment success/cancel & auth error detection
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    if(params.get('payment')==='success'){
      showToast('🎉 Welcome to Pro! Enjoy unlimited plans.');
      window.history.replaceState({},'','/');
      // Poll for updated subscription after Stripe webhook fires (2s, 6s, 14s)
      sb.auth.getSession().then(({data:{session}})=>{
        if(!session?.user)return;
        const uid=session.user.id,email=session.user.email;
        [2000,6000,14000].forEach(delay=>{
          setTimeout(async()=>{
            const t=await checkTier(uid,email);
            if(t!=='free')showToast('✅ '+( t==='explorer'?'Explorer':'Pro')+' plan activated!');
          },delay);
        });
      });
    } else if(params.get('payment')==='cancelled'){
      window.history.replaceState({},'','/');
    }
    const authError=params.get('error');
    if(authError){
      const desc=params.get('error_description')||authError;
      showToast('Login failed: '+desc.replace(/\+/g,' '));
      window.history.replaceState({},'','/');
    }
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setUser(session?.user||null));
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
  if(user){
    loadPlans();
    loadProjects();
    checkTier(user.id,user.email);
  } else {
    setPlans([]);
    setUserTier('free');
  }
},[user]);

  async function loadProjects(){
  try{const{data}=await sb.from('trip_projects').select('*').order('created_at',{ascending:false});if(data)setProjects(data||[]);}catch{}
}

async function createProject(name){
  try{
    const{data}=await sb.from('trip_projects').insert({user_id:user.id,name,emoji:'✈️'}).select().single();
    if(data)setProjects(p=>[data,...p]);
  }catch{}
}

async function deleteProject(id){
  await sb.from('trip_projects').delete().eq('id',id);
  setProjects(p=>p.filter(x=>x.id!==id));
}
  
  async function loadPlans(){
    setLoadingPlans(true);
    try{const{data,error}=await sb.from('saved_plans').select('id,title,created_at,is_draft,project_id').order('created_at',{ascending:false});if(!error)setPlans(data||[]);}
    catch{}setLoadingPlans(false);
  }

  async function savePlan(){
    if(!user||msgs.length===0)return;
    setSavingPlan(true);
    try{
      const title=extractTitle(hist.current);

  function generatePDF(){
  if(!msgs||msgs.length===0){showToast('No trip to export!');return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pageW=210;const pageH=297;const margin=18;const maxW=pageW-margin*2;
  let y=margin;

  // Header background
  doc.setFillColor(28,25,20);
  doc.rect(0,0,pageW,30,'F');

  // Atlas logo circles
  doc.setDrawColor(201,169,110);
  doc.setLineWidth(0.4);
  doc.circle(margin+6,15,8);
  doc.circle(margin+6,15,6);
  doc.setFillColor(201,169,110);
  doc.circle(margin+6,15,1.5,'F');

  // Atlas title
  doc.setTextColor(212,170,110);
  doc.setFontSize(18);
  doc.setFont('helvetica','bold');
  doc.text('ATLAS',margin+16,17);
  doc.setFontSize(7);
  doc.setFont('helvetica','normal');
  doc.setTextColor(150,130,90);
  doc.text('AI TRAVEL PLANNER',margin+16,22);

  // Date top right
  doc.setFontSize(7);
  doc.setTextColor(100,90,60);
  doc.text(new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'}),pageW-margin,17,{align:'right'});

  y=40;

  // Trip title
  const tripTitle=extractTitle(msgs.map(m=>({role:m.from==='user'?'user':'assistant',content:m.text||''})));
  doc.setFontSize(16);
  doc.setFont('helvetica','bold');
  doc.setTextColor(201,169,110);
  doc.text(tripTitle,margin,y);
  y+=8;

  // Divider
  doc.setDrawColor(201,169,110);
  doc.setLineWidth(0.3);
  doc.line(margin,y,pageW-margin,y);
  y+=8;

  // Get last AI message
  const aiMsgs=msgs.filter(m=>m.from==='ai'&&m.text);
  if(aiMsgs.length===0){showToast('No plan to export!');return;}
  const lastAI=stripMapData(aiMsgs[aiMsgs.length-1].text);

  // Clean text
  const cleanText=lastAI
    .replace(/[\u{1F300}-\u{1F9FF}]/gu,'')
    .replace(/[\u{2600}-\u{26FF}]/gu,'')
    .replace(/[\u{2700}-\u{27BF}]/gu,'')
    .replace(/[^\x00-\x7F]/g,'')
    .replace(/\*\*/g,'')
    .replace(/#{1,3}\s/g,'')
    .replace(/◆\s/g,'• ')
    .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')
    .replace(/\[MAPDATA\][\s\S]*?\[\/MAPDATA\]/g,'');

  const lines=cleanText.split('\n').filter(l=>l.trim());

  doc.setFont('helvetica','normal');

  for(const line of lines){
    if(y>pageH-25){
      // Footer before new page
      doc.setFontSize(7);
      doc.setTextColor(80,70,40);
      doc.text('getatlas.ca · AI Travel Planner',pageW/2,pageH-8,{align:'center'});
      doc.addPage();
      doc.setFillColor(28,25,20);
      doc.rect(0,0,pageW,8,'F');
      y=18;
    }

    const trimmed=line.trim();
    if(!trimmed)continue;

    // Section headers (## )
    if(trimmed.startsWith('##')||/^DAYS?\s+\d+/i.test(trimmed)||/^Day\s+\d+/i.test(trimmed)){
      y+=3;
      doc.setFontSize(9);
      doc.setFont('helvetica','bold');
      doc.setTextColor(201,169,110);
      const headerText=trimmed.replace(/^#+\s*/,'');
      doc.text(headerText,margin,y);
      y+=5;
    }
    // Bullet points
    else if(trimmed.startsWith('•')||trimmed.startsWith('-')||trimmed.startsWith('◆')){
      doc.setFontSize(8);
      doc.setFont('helvetica','normal');
      doc.setTextColor(160,150,130);
      const bulletText=trimmed.replace(/^[•\-◆]\s*/,'');
      const splitLines=doc.splitTextToSize('• '+bulletText,maxW-4);
      doc.text(splitLines,margin+3,y);
      y+=splitLines.length*4+1;
    }
    // Regular text
    else{
      doc.setFontSize(8);
      doc.setFont('helvetica','normal');
      doc.setTextColor(180,170,150);
      const splitLines=doc.splitTextToSize(trimmed,maxW);
      doc.text(splitLines,margin,y);
      y+=splitLines.length*4+1;
    }
  }

  // Footer last page
  doc.setFontSize(7);
  doc.setTextColor(80,70,40);
  doc.text('getatlas.ca · AI Travel Planner',pageW/2,pageH-8,{align:'center'});
  doc.setTextColor(60,50,30);
  doc.text('Generated by Atlas AI · Please verify all travel information before booking',pageW/2,pageH-4,{align:'center'});

  // Save
  const filename=tripTitle.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'_atlas.pdf';
  doc.save(filename);
  showToast('📄 PDF downloaded!');
}
